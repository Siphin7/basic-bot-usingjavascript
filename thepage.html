<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeacherBot Introduction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .container{
            width:90%;
            max-width:700px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#2563eb;
        }

        .output{
            background:#111827;
            color:#10b981;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
            font-family:monospace;
            white-space:pre-line;
            min-height:300px;
        }

        button{
            margin-top:15px;
            padding:12px 20px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>TeacherBot Introduction</h1>

    <button onclick="runBot()">Start TeacherBot</button>

    <div id="output" class="output"></div>

</div>

<script src="teacherbot.js"></script>

</body>
</html>
